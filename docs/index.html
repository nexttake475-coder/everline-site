<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Everline Media Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 780px;
      padding: 40px 24px;
      text-align: center;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #b8b8b8;
      margin: 22px auto 0;
      max-width: 640px;
    }
    .cta {
      margin-top: 34px;
    }
    .cta a {
      display: inline-block;
      text-decoration: none;
      color: #0a0a0a;
      background: #ffffff;
      padding: 14px 26px;
      border-radius: 8px;
      font-weight: 700;
    }
    .footer {
      margin-top: 26px;
      font-size: 14px;
      color: #7f7f7f;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Everline Media Systems</div>
    <h1>Manufacturing intellectual property into compounding digital assets.</h1>
    <p>
      Everline is a sovereign publishing infrastructure for building authority,
      products, and revenue through systems that scale beyond manual output.
    </p>
    <div class="cta">
      <a href="#">Enter Everline</a>
    </div>
    <div class="footer">
      Website in build mode.
    </div>
  </div>
</body>
</html>
